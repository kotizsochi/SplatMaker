<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>SplatMaker - 3D Gaussian Splat Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;color:#e0e0e0;font-family:'Inter',sans-serif;overflow:hidden}
canvas{width:100vw;height:100vh;display:block}
.hud{position:fixed;top:16px;left:16px;z-index:10}
.hud h2{font-size:16px;color:#a78bfa;margin-bottom:4px}
.hud p{font-size:11px;color:#666}
.toolbar{position:fixed;top:16px;right:16px;z-index:10;display:flex;gap:6px;flex-direction:column;align-items:flex-end}
.tb-btn{padding:6px 14px;background:rgba(12,12,30,0.85);border:1px solid #2a2a3e;border-radius:8px;
  color:#a78bfa;font-size:12px;cursor:pointer;text-decoration:none;font-family:inherit;white-space:nowrap;
  transition:all .2s;display:flex;align-items:center;gap:6px}
.tb-btn:hover{background:rgba(99,102,241,0.2);border-color:#6366f1}
.tb-btn.active{background:rgba(99,102,241,0.3);border-color:#8b5cf6}
.controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;gap:12px;background:rgba(12,12,30,0.9);padding:10px 20px;border-radius:12px;border:1px solid #2a2a3e;
  backdrop-filter:blur(10px)}
.controls label{font-size:11px;color:#888;display:flex;align-items:center;gap:6px}
.controls input[type=range]{width:80px;accent-color:#8b5cf6}
.controls span{font-size:11px;color:#a78bfa;min-width:30px}
.loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;text-align:center}
.loading h3{color:#a78bfa;font-size:18px;margin-bottom:8px}
.loading p{color:#666;font-size:12px}
.spinner{width:40px;height:40px;border:3px solid #2a2a3e;border-top-color:#8b5cf6;border-radius:50%;
  animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.stats{position:fixed;bottom:16px;right:16px;z-index:10;font-size:10px;color:#555;text-align:right;
  background:rgba(12,12,30,0.85);padding:8px 12px;border-radius:8px;border:1px solid #2a2a3e}
.mode-indicator{position:fixed;top:50%;right:16px;transform:translateY(-50%);z-index:10;
  writing-mode:vertical-lr;font-size:10px;color:#555;letter-spacing:2px}
.fallback-notice{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:10;
  background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);border-radius:8px;
  padding:6px 14px;font-size:11px;color:#fbbf24;display:none}
</style>
</head>
<body>
<div class="hud">
  <h2>{{ job_name }}</h2>
  <p id="viewerMode">3D Gaussian Splat Viewer</p>
</div>

<div class="toolbar">
  <a href="/" class="tb-btn">Назад</a>
  <a href="https://playcanvas.com/supersplat/editor" target="_blank" class="tb-btn" title="Открыть в SuperSplat Editor">
    SuperSplat Editor
  </a>
  <button class="tb-btn" id="btnScreenshot" onclick="takeScreenshot()">Скриншот</button>
  <button class="tb-btn" id="btnReset" onclick="resetCamera()">Сброс камеры</button>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <h3>Загрузка модели...</h3>
  <p id="loadProgress">0%</p>
</div>

<div class="controls" id="controls" style="display:none">
  <label>Фон <input type="range" id="bgBright" min="0" max="50" step="1" value="5"> <span id="bgVal">5</span></label>
</div>

<div class="stats" id="stats"></div>
<div class="fallback-notice" id="fallbackNotice">Fallback: Point Cloud mode (gsplat.js не загрузился)</div>

<canvas id="canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
  }
}
</script>

<script type="module">
// Try gsplat.js first, fallback to three.js point cloud
const PLY_URL = '/api/job/{{ job_id }}/ply';
let gsplatLoaded = false;

async function tryGsplat() {
  try {
    const SPLAT = await import('https://cdn.jsdelivr.net/npm/gsplat@1.0.2/+esm');
    
    const canvas = document.getElementById('canvas');
    const renderer = new SPLAT.WebGLRenderer(canvas);
    const scene = new SPLAT.Scene();
    const camera = new SPLAT.Camera();
    const controls = new SPLAT.OrbitControls(camera, canvas);
    
    // Load PLY
    document.getElementById('loadProgress').textContent = 'Loading gsplat...';
    
    await SPLAT.PLYLoader.LoadAsync(
      PLY_URL, scene,
      (progress) => {
        const pct = Math.round(progress * 100);
        document.getElementById('loadProgress').textContent = pct + '%';
      }
    );
    
    gsplatLoaded = true;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    document.getElementById('viewerMode').textContent = '3D Gaussian Splat Viewer (gsplat.js)';
    
    // Stats
    document.getElementById('stats').innerHTML = 'Gaussian Splat<br>gsplat.js renderer';
    
    const handleResize = () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
    };
    
    const frame = () => {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(frame);
    };
    
    handleResize();
    window.addEventListener('resize', handleResize);
    requestAnimationFrame(frame);
    
    // Background control
    document.getElementById('bgBright').oninput = (e) => {
      const v = parseInt(e.target.value);
      document.getElementById('bgVal').textContent = v;
      canvas.style.background = `rgb(${v*5},${v*5},${v*5.5})`;
    };
    
    // Screenshot
    window.takeScreenshot = () => {
      const link = document.createElement('a');
      link.download = '{{ job_name }}_splat.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    };
    
    // Reset camera
    window.resetCamera = () => {
      camera.position.x = 0;
      camera.position.y = 2;
      camera.position.z = -5;
    };
    
    return true;
  } catch(e) {
    console.warn('gsplat.js failed:', e);
    return false;
  }
}

async function fallbackThreeJS() {
  const THREE = await import('three');
  const { PLYLoader } = await import('three/addons/loaders/PLYLoader.js');
  const { OrbitControls } = await import('three/addons/controls/OrbitControls.js');
  
  document.getElementById('fallbackNotice').style.display = 'block';
  document.getElementById('viewerMode').textContent = '3D Point Cloud Viewer (three.js fallback)';
  
  const canvas = document.getElementById('canvas');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d0d1a);
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 1000);
  const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  
  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.rotateSpeed = 0.5;
  
  scene.add(new THREE.GridHelper(20, 40, 0x1a1a3e, 0x0e0e1e));
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  
  let pointCloud = null;
  
  const loader = new PLYLoader();
  const xhr = new XMLHttpRequest();
  xhr.open('GET', PLY_URL);
  xhr.responseType = 'arraybuffer';
  xhr.onprogress = (e) => {
    if(e.lengthComputable){
      const pct = Math.round(e.loaded/e.total*100);
      document.getElementById('loadProgress').textContent = pct+'% ('+Math.round(e.loaded/1048576)+' MB)';
    }
  };
  xhr.onload = () => {
    document.getElementById('loading').style.display='none';
    document.getElementById('controls').style.display='flex';
    
    const geometry = loader.parse(xhr.response);
    geometry.computeBoundingSphere();
    geometry.computeBoundingBox();
    
    const hasColors = geometry.hasAttribute('color');
    const material = new THREE.PointsMaterial({
      size: 1, sizeAttenuation: true,
      vertexColors: hasColors,
      color: hasColors ? 0xffffff : 0xa78bfa,
    });
    
    pointCloud = new THREE.Points(geometry, material);
    scene.add(pointCloud);
    
    const center = geometry.boundingSphere.center;
    const radius = geometry.boundingSphere.radius;
    camera.position.set(center.x + radius*1.5, center.y + radius*0.8, center.z + radius*1.5);
    controls.target.copy(center);
    controls.update();
    
    const nPoints = geometry.attributes.position.count;
    const box = geometry.boundingBox;
    const size = new THREE.Vector3();
    box.getSize(size);
    document.getElementById('stats').innerHTML =
      nPoints.toLocaleString()+' points<br>'+
      size.x.toFixed(1)+' x '+size.y.toFixed(1)+' x '+size.z.toFixed(1)+' m';
  };
  xhr.onerror = () => {
    document.getElementById('loading').innerHTML = '<h3 style="color:#f87171">PLY not found</h3>';
  };
  xhr.send();
  
  // Controls
  document.getElementById('bgBright').oninput = (e) => {
    const v = parseInt(e.target.value);
    document.getElementById('bgVal').textContent = v;
    const c = v/255;
    scene.background = new THREE.Color(c, c, c*1.1);
  };
  
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  
  window.takeScreenshot = () => {
    renderer.render(scene, camera);
    const link = document.createElement('a');
    link.download = '{{ job_name }}_pointcloud.png';
    link.href = renderer.domElement.toDataURL('image/png');
    link.click();
  };
  
  window.resetCamera = () => {
    if(pointCloud && pointCloud.geometry.boundingSphere){
      const c = pointCloud.geometry.boundingSphere.center;
      const r = pointCloud.geometry.boundingSphere.radius;
      camera.position.set(c.x+r*1.5, c.y+r*0.8, c.z+r*1.5);
      controls.target.copy(c);
      controls.update();
    }
  };
  
  function animate(){
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
}

// Main: try gsplat first, fallback to three.js
async function init() {
  const ok = await tryGsplat();
  if (!ok) {
    await fallbackThreeJS();
  }
}
init();
</script>
</body>
</html>
