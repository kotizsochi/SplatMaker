<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>SplatMaker - 3D Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;color:#e0e0e0;font-family:'Inter',sans-serif;overflow:hidden}
#viewer{width:100vw;height:100vh}
.hud{position:fixed;top:16px;left:16px;z-index:10}
.hud h2{font-size:16px;color:#a78bfa;margin-bottom:4px}
.hud p{font-size:11px;color:#666}
.controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;gap:8px;background:rgba(12,12,30,0.85);padding:8px 16px;border-radius:10px;border:1px solid #2a2a3e}
.controls label{font-size:11px;color:#888;display:flex;align-items:center;gap:4px}
.controls input[type=range]{width:80px;accent-color:#8b5cf6}
.controls span{font-size:11px;color:#a78bfa;min-width:30px}
.back{position:fixed;top:16px;right:16px;z-index:10;padding:6px 14px;background:rgba(99,102,241,0.2);
  border:1px solid #6366f130;border-radius:8px;color:#a78bfa;font-size:12px;cursor:pointer;
  text-decoration:none;font-family:inherit}
.back:hover{background:rgba(99,102,241,0.3)}
.loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;text-align:center}
.loading h3{color:#a78bfa;font-size:18px;margin-bottom:8px}
.loading p{color:#666;font-size:12px}
.spinner{width:40px;height:40px;border:3px solid #2a2a3e;border-top-color:#8b5cf6;border-radius:50%;
  animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.stats{position:fixed;top:16px;right:120px;z-index:10;font-size:10px;color:#555;text-align:right}
</style>
</head>
<body>
<div class="hud">
  <h2>{{ job_name }}</h2>
  <p>3D Point Cloud Viewer</p>
</div>
<a href="/" class="back">Назад</a>
<div class="loading" id="loading">
  <div class="spinner"></div>
  <h3>Загрузка модели...</h3>
  <p id="loadProgress">0%</p>
</div>
<div class="controls" id="controls" style="display:none">
  <label>Размер точек <input type="range" id="ptSize" min="0.1" max="5" step="0.1" value="1"> <span id="ptVal">1</span></label>
  <label>Фон <input type="range" id="bgBright" min="0" max="50" step="1" value="5"> <span id="bgVal">5</span></label>
</div>
<div class="stats" id="stats"></div>
<div id="viewer"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { PLYLoader } from 'three/addons/loaders/PLYLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d1a);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.getElementById('viewer').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.rotateSpeed = 0.5;

// Grid helper
const grid = new THREE.GridHelper(20, 40, 0x1a1a3e, 0x0e0e1e);
scene.add(grid);

// Ambient light
scene.add(new THREE.AmbientLight(0xffffff, 0.5));

let pointCloud = null;

const loader = new PLYLoader();
const xhr = new XMLHttpRequest();
xhr.open('GET', '/api/job/{{ job_id }}/ply');
xhr.responseType = 'arraybuffer';
xhr.onprogress = (e) => {
  if(e.lengthComputable){
    const pct = Math.round(e.loaded/e.total*100);
    document.getElementById('loadProgress').textContent = pct+'% ('+Math.round(e.loaded/1048576)+' MB)';
  }
};
xhr.onload = () => {
  document.getElementById('loading').style.display='none';
  document.getElementById('controls').style.display='flex';

  const geometry = loader.parse(xhr.response);
  geometry.computeBoundingSphere();
  geometry.computeBoundingBox();

  const hasColors = geometry.hasAttribute('color');
  const material = new THREE.PointsMaterial({
    size: 1, sizeAttenuation: true,
    vertexColors: hasColors,
    color: hasColors ? 0xffffff : 0xa78bfa,
  });

  pointCloud = new THREE.Points(geometry, material);
  scene.add(pointCloud);

  // Center camera on model
  const center = geometry.boundingSphere.center;
  const radius = geometry.boundingSphere.radius;
  camera.position.set(center.x + radius*1.5, center.y + radius*0.8, center.z + radius*1.5);
  controls.target.copy(center);
  controls.update();

  // Stats
  const nPoints = geometry.attributes.position.count;
  const box = geometry.boundingBox;
  const size = new THREE.Vector3();
  box.getSize(size);
  document.getElementById('stats').innerHTML =
    nPoints.toLocaleString()+' points<br>'+
    size.x.toFixed(1)+' x '+size.y.toFixed(1)+' x '+size.z.toFixed(1)+' m';
};
xhr.onerror = () => {
  document.getElementById('loading').innerHTML = '<h3 style="color:#f87171">PLY not found</h3>';
};
xhr.send();

// Controls
document.getElementById('ptSize').oninput = (e) => {
  const v = parseFloat(e.target.value);
  document.getElementById('ptVal').textContent = v.toFixed(1);
  if(pointCloud) pointCloud.material.size = v;
};
document.getElementById('bgBright').oninput = (e) => {
  const v = parseInt(e.target.value);
  document.getElementById('bgVal').textContent = v;
  const c = v/255;
  scene.background = new THREE.Color(c, c, c*1.1);
};

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
